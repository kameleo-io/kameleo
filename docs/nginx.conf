# Static site config for Retype-generated documentation
# Running behind Cloudflare; assume TLS termination and HTTP/2 handled upstream.

# Hide nginx exact version
server_tokens off;

map $sent_http_content_type $static_file_cache_control {
  default                   "public, max-age=300"; # 5 minutes default
  ~*text/css                 "public, max-age=31536000, immutable";
  ~*application/javascript   "public, max-age=31536000, immutable";
  ~*application/json         "public, max-age=300";   # JSON may change
  ~*image/                   "public, max-age=31536000, immutable";
  ~*font/                    "public, max-age=31536000, immutable";
  ~*svg                      "public, max-age=31536000, immutable";
}

# Retype outputs an index.html root and other static assets.
server {
  listen 80 default_server;
  listen [::]:80 default_server;

  root /usr/share/nginx/html;
  index index.html;

  # Try exact file, then fallback to index.html for client-side navigation (if any). If purely static with no SPA routing, could simplify.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache control logic: set per content type after response content type known.
  # Use a post-processing handler (header filter). We'll assign in a dedicated location block but easier via types mapping + add_header.
  # We can't conditionally add header after content-type mapping easily, so use add_header with always and map variable.
  add_header Cache-Control $static_file_cache_control always;

  # If .gz files exist, serve directly.
  gzip_static on;

  # Deny access to hidden files or config (defense-in-depth)
  location ~ /\.(?!well-known).* { return 404; }
}
